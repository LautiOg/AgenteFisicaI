<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Central Nucleus -->
  <circle cx="50" cy="50" r="10" fill="#5865F2" />
  
  <!-- Orbit 1 (Rotated 30 deg) -->
  <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#E6EDF3" stroke-width="2" transform="rotate(30 50 50)" />
  <circle cx="13.6" cy="29" r="4.5" fill="#4ADE80" /> <!-- Electron 1 -->

  <!-- Orbit 2 (Rotated 90 deg) -->
  <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#E6EDF3" stroke-width="2" transform="rotate(90 50 50)" />
  <circle cx="50" cy="8" r="4.5" fill="#F0A500" /> <!-- Electron 2 -->

  <!-- Orbit 3 (Rotated 150 deg) -->
  <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#E6EDF3" stroke-width="2" transform="rotate(150 50 50)" />
  <circle cx="86.4" cy="29" r="4.5" fill="#EC4899" /> <!-- Electron 3 -->
</svg>